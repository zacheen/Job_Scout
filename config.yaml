  - ", co"
  - ", ga"
  - ", or"
  - ", nc"
  # State codes added 2026-07-10 for the CV-company wave (Pittsburgh/Ann Arbor/MD-VA defense
  # cluster etc.). Collision audit: ", pa"/", az" leaks are backstopped in
  # exclude_location_terms; ", in" (=", India") and ", la"/", mo" (=", Lagos/Lahore",
  # ", Morocco/Moldova") are deliberately NOT listed — their cities/states are covered by
  # the spelled-out names below instead.
  - ", pa"
