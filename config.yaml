# Tunable pipeline settings. Secrets are NOT here (they live in env / GitHub Actions secrets).

# Dedupe ledger path. Override per-machine with the LEDGER_FILE env var so a local
# run keeps a separate "seen" list from the committed cloud ledger.
ledger_path: "data/seen_jobs.csv"

# OpenAI model used for scoring.
model: "gpt-5.5"

# Reasoning effort for reasoning models (gpt-5.5): none | low | medium | high | xhigh.
# "mid" = medium. Leave blank ("") for non-reasoning models (e.g. gpt-4o-mini).
reasoning_effort: "medium"

# Fallback when no OPENAI_API_KEY: a local GPT CLI to drive (authed via a ChatGPT
# login). gpt_cli is the executable (override per-machine with the GPT_CLI env var,
# e.g. a full path with spaces); gpt_cli_args are the args before the prompt, which
# is appended last. If gpt_cli isn't found, scoring drops to keyword-only.
# `-c model_reasoning_effort=low` overrides codex's own config.toml default (e.g. xhigh) —
# a simple rating doesn't need more, and low is far faster/cheaper.
gpt_cli: "codex"
gpt_cli_args: ["exec", "-c", "model_reasoning_effort=low"]

# Truncate each job description to this many characters before sending to the LLM.
max_description_chars: 8000

# How many jobs to score concurrently (1 = sequential). Higher clears a backlog faster,
# but the CLI path (codex exec) spawns one heavy subprocess per worker, and all workers
# share your ChatGPT rate limit — raise cautiously.
score_workers: 5

# HTTP behaviour for the ATS fetchers.
request_timeout: 20
user_agent: "job-scout/1.0 (+https://github.com/)"

# Polite random delay (seconds) before every request, applied centrally in HttpClient;
# jitter avoids a fixed cadence that looks like a bot.
request_delay_min: 1.25
request_delay_max: 2.0

# Each new role is routed to the FIRST track whose keywords appear (in title or
# description), then scored against that track. Order matters — list the more
# specific track first. Each track emails its own digest, titled by `name`.
# `description` is what the LLM scores relevance against; `threshold` gates emails.
tracks:
  - name: "Computer Vision"
    threshold: 50
    description: "a computer-vision engineering or research role (image/video/visual perception, detection, segmentation, 3D vision)"
    keywords:
      - "computer vision"
      - "image"
      - "video"
      - "segmentation"
      - "object detection"
      - "perception"
      - "slam"
      - "point cloud"
      - "ocr"
      - "3d"
      - "visual"
  # AI/ML before Software Engineering: a role matching both lands in the AI/ML email.
  - name: "AI / ML"
    threshold: 50
    description: "an AI/ML engineering or research role (model training, deep learning, LLM/NLP, ML systems, data science)"
    keywords:
      - "machine learning"
      - "deep learning"
      - "artificial intelligence"
      - "ml engineer"
      - "ai engineer"
      - "genai"
      - "generative ai"
      - "llm"
      - "nlp"
      - "neural network"
      - "mlops"
      - "reinforcement learning"
      - "recommendation system"
      - "data scientist"
  - name: "Software Engineering"
    threshold: 50
    description: "a software-engineering role (backend, full-stack, distributed systems, platform/infra/data engineering)"
    keywords:
      - "software engineer"
      - "backend engineer"
      - "frontend engineer"
      - "full stack"
      - "full-stack"
      - "distributed systems"
      - "data engineer"
      - "platform engineer"
      - "infrastructure engineer"
      - "devops"
      - "site reliability"
  # Senior is a title override, not a keyword track: a role is first routed by the
  # keyword tracks above, then reclassified here if its TITLE contains a title_term
  # (whole-word, so "sr" doesn't hit inside other words). A senior role that matches
  # no keyword track is still dropped. Listed last so its email section is last.
  - name: "Senior"
    threshold: 50
    description: "a senior-level computer vision, AI/ML, or software engineering role"
    title_terms:
      - "senior"
      - "sr"

# Drop unwanted roles before any scoring (any tier): non-technical OR too-senior. Matched as a
# lowercase substring in the title OR the department — so e.g. department "Sales"
# is excluded too.
exclude_terms:
  # too senior for an intern / new-grad applicant (title substring). Note: bare "vp"
  # is intentionally NOT listed — it would substring-match "vpc"/"vpn" tech roles.
  - "director"
  - "principal"
  - "staff"
  - "vice president"
  # requires an advanced degree — both "PhD" and "Ph.D." spellings (substring, lowercased)
  - "phd"
  - "ph.d"
  # technical areas outside the user's target (CV / AI-ML / SWE). "physics" won't
  # substring-match "physical"; "gpu" has no common English-word collisions.
  - "physics"
  - "safety"
  - "network"
  - "gpu" # usually is related to CUDA or kernel
  - "kernel" # low-level OS / GPU-kernel systems roles, outside the CV/AI-ML/SWE target
  # non-technical functions
  - "marketing"
  - "sales"
  - "customer"
  - "recruit"
  - "recruiter"
  - "account executive"
  - "designer"
  - "finance"
  - "banking"
  - "legal"
  - "talent"
  - "brand"
  - "social media"
  - "community"
  - "business development"
  - "people partner"
  # Trailing space is deliberate: matches "partner <role>" (e.g. partner marketing/solutions)
  # but NOT "partnership(s)".
  - "partner "

# Highest-priority filter: drop a job if its DEPARTMENT contains any of these
# (lowercase substring). Checked before every other rule.
exclude_dept_terms:
  - "audit"
  - "business"
  - "sales"
  - "commercial"
  - "market"
  - "customer"

# Companies you have a referral at -> their roles form the TOP email group "Referral"
# (above Intern). Matched against the company NAME (case-insensitive), so each must match
# the `name:` used in companies.yaml.
referral_companies:
  - "Google"
  - "Microsoft"
  - "Zoox"
  - "Ford"
  - "Meta"
  - "Tesla"
  - "Dell"
  - "Intel"
  - "Applied Materials"

# Roles whose TITLE matches one of these (whole-word, case-insensitive) form the "Intern"
# group (below Referral, above "Other roles"). Whole-word matching keeps "internal" /
# "international" out.
intern_terms:
  - "intern"
  - "internship"
  - "co-op"
  - "coop"

# Backstop for location_us_terms below: its short state codes leak country names through
# (", ca" -> ", Canada"; ", co" -> ", Colombia"). "colombia" ('o') is spelled to deliberately
# avoid matching US "Columbia" ('u').
exclude_location_terms:
  - "canada"
  - "colombia"
  - "malaysia"

# A job is treated as US-based if its location string contains any of these.
# Heuristic and imperfect: bare "remote" also matches non-US remote roles, and
# unknown/empty locations are excluded. Refine to taste.
location_us_terms:
  - "united states"
  - "usa"
  - "u.s."
  - "remote"
  - "california"
  - "new york"
  - "washington"
  - "texas"
  - "massachusetts"
  - "illinois"
  - "colorado"
  - "georgia"
  - "oregon"
  - "north carolina"
  - ", ca"
  - ", ny"
  - ", wa"
  - ", tx"
  - ", ma"
  - ", il"
  - ", co"
  - ", ga"
  - ", or"
  - ", nc"
  - "san francisco"
  - "mountain view"
  - "sunnyvale"
  - "palo alto"
  - "san jose"
  - "santa clara"
  - "cupertino"
  - "menlo park"
  - "seattle"
  - "redmond"
  - "bellevue"
  - "new york city"
  - "austin"
  - "boston"
  - "los angeles"
  - "chicago"
  - "atlanta"
  - "denver"
