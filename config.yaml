# Tunable pipeline settings. Secrets are NOT here (they live in env / GitHub Actions secrets).

# Dedupe ledger DIRECTORY (one CSV per company, kept small for diffing). Override
# per-machine with LEDGER_DIR so a local run keeps a separate "seen" list from the
# committed cloud ledger (cloud_data/ on the data branch).
ledger_dir: "local_data"

# OpenAI model used for scoring.
model: "gpt-5.6"

# Reasoning effort for reasoning models (gpt-5.6): none | low | medium | high | xhigh.
# "mid" = medium. Leave blank ("") for non-reasoning models (e.g. gpt-4o-mini).
reasoning_effort: "medium"

# Fallback when no OPENAI_API_KEY: a local GPT CLI to drive (authed via a ChatGPT
# login). gpt_cli is the executable (override per-machine with the GPT_CLI env var,
# e.g. a full path with spaces); gpt_cli_args are the args before the prompt, which
# is appended last. If gpt_cli isn't found, scoring drops to keyword-only.
# `-c model=gpt-5.6-luna` pins codex's fast/cheap tier for this rating task, overriding
# whatever model codex's own config.toml defaults to; `-c model_reasoning_effort=low`
# likewise overrides its reasoning default (e.g. xhigh) — a simple rating doesn't need
# more, and low is far faster/cheaper.
# Senior-group roles (see senior_terms) skip the CLI even locally — keyword heuristic
# instead (wired in __main__).
gpt_cli: "codex"
gpt_cli_args: ["exec", "-c", "model=gpt-5.6-luna", "-c", "model_reasoning_effort=low"]

# Truncate each job description to this many characters before sending to the LLM.
max_description_chars: 8000

# How many jobs to score concurrently (1 = sequential). Higher clears a backlog faster,
# but the CLI path (codex exec) spawns one heavy subprocess per worker, and all workers
# share your ChatGPT rate limit — raise cautiously.
score_workers: 5

# HTTP behaviour for the ATS fetchers.
request_timeout: 20
user_agent: "job-scout/1.0 (+https://github.com/)"

# Polite random delay (seconds) before every request, applied centrally in HttpClient;
# jitter avoids a fixed cadence that looks like a bot.
request_delay_min: 1.25
request_delay_max: 2.0

# Each new role is routed to the FIRST track whose keyword hit count reaches its
# `min_hits` (a hit = one occurrence of a keyword in the title or description; the
# SAME keyword occurring N times counts as N hits). Order matters — list the more
# specific track first. Each track is its own email section, titled by `name`.
# `threshold` gates emails: a role is emailed only when its experience_score
# (LLM: resume-vs-role fit, 0-100) exceeds it.
tracks:
  - name: "Computer Vision"
    threshold: 50
    min_hits: 1
    keywords:
      - "computer vision"
      - "image"
      - "video"
      - "segmentation"
      - "object detection"
      - "perception"
      - "slam"
      - "point cloud"
      - "ocr"
      - "3d"
      - "visual"
  # AI/ML before Software Engineering: a role matching both lands in the AI/ML email.
  - name: "AI / ML"
    threshold: 50
    min_hits: 1
    keywords:
      - "machine learning"
      - "deep learning"
      - "artificial intelligence"
      - "ml engineer"
      - "ai engineer"
      - "genai"
      - "generative ai"
      - "llm"
      - "nlp"
      - "neural network"
      - "mlops"
      - "reinforcement learning"
      - "recommendation system"
      - "data scientist"
  - name: "Software Engineering"
    threshold: 50
    min_hits: 1
    keywords:
      - "software engineer"
      - "backend engineer"
      - "frontend engineer"
      - "full stack"
      - "full-stack"
      - "distributed systems"
      - "data engineer"
      - "platform engineer"
      - "infrastructure engineer"
      - "devops"
      - "site reliability"

# Drop unwanted roles before any scoring (any tier): non-technical OR too-senior. Matched as a
# lowercase substring in the title OR the department — so e.g. department "Sales"
# is excluded too.
exclude_terms:
  # too senior for an intern / new-grad applicant (title substring). Note: bare "vp"
  # is intentionally NOT listed — it would substring-match "vpc"/"vpn" tech roles.
  - "director"
  - "principal"
  - "staff"
  - "lead" # safe as substring: its matches (lead/leader/leadership/leading) are all senior
  - "vice president"
  - "head of " # "Head of X" senior roles; trailing space avoids "head office". NOT bare "head" — even whole-word it hits CV terms (head pose/detection/tracking, head-mounted)
  # requires an advanced degree — both "PhD" and "Ph.D." spellings (substring, lowercased)
  - "phd"
  - "ph.d"
  - "postdoc" # stem also matches "postdoctoral" (researcher/fellow/scholar)
  # technical / scientific fields outside the user's target (CV / AI-ML / SWE). "physics"
  # won't substring-match "physical"; "gpu" has no common English-word collisions.
  - "physics"
  - "chemistry" # won't match "chemical" (different stem)
  - "drug" # pharma / drug-discovery domain
  - "environmental" # environmental science / sustainability field
  - "mechanical" # different engineering discipline (also matches "electromechanical")
  - "electrical"
  - "firmware"
  - "safety"
  - "network"
  - "cybersecurity"
  - "cyber security" # separate entry: substring won't unify it with the one-word spelling
  - "data center" # infra / facilities ops
  - "datacenter" # one-word spelling of the above
  - "gpu" # usually is related to CUDA or kernel
  - "kernel" # low-level OS / GPU-kernel systems roles, outside the CV/AI-ML/SWE target
  # non-technical functions
  - "marketing"
  - "sales"
  - "customer"
  - "recruit"
  - "recruiter"
  - "account executive"
  - "designer"
  - "artist" # 3D / concept / technical / VFX artist
  - "animator"
  - "finance"
  - "banking"
  - "legal"
  - "policy" # public-policy / policy-analyst roles
  - "talent"
  - "brand"
  - "social media"
  - "community"
  - "business" # broad: subsumes "business development"; also drops "Business Intelligence/Analyst" titles
  - "supply" # subsumes "supply chain"; also supplier / procurement / power-supply roles
  - "buyer"
  - "merchandising"
  - "people partner"
  # Trailing space is deliberate: matches "partner <role>" (e.g. partner marketing/solutions)
  # but NOT "partnership(s)".
  - "partner "

# Highest-priority filter: drop a job if its DEPARTMENT contains any of these
# (lowercase substring). Checked before every other rule.
exclude_dept_terms:
  - "audit"
  - "sales"
  - "commercial"
  - "market"
  - "customer"

# Whole-word exclusions (\b...\b), matched against title OR department. Use this list
# (not exclude_terms) for any token short enough to be an unsafe substring: e.g. "ux"
# drops "UX Designer/Researcher" but not "Linux"/"flux"/"redux"/"auxiliary".
exclude_word_terms:
  - "ux"
  - "tpu" # whole-word: bare "tpu" would substring-hit "output"

# Drop a job when its DESCRIPTION contains any of these (lowercase substring; the text is
# whitespace-collapsed and curly apostrophes straightened before matching, so a phrase still
# hits across the line breaks strip_html leaves). Purpose: the formulaic "no visa/immigration
# sponsorship" legal boilerplate. CAVEAT: Workday listings carry NO description (Oracle only
# a short blurb) — those roles can't be caught here (the LLM sees the same text, so it
# couldn't either). Substring redundancy is deliberate: "does not offer VISA sponsorship"
# does NOT contain "not offer sponsorship", so the visa/immigration middles get their own rows.
exclude_description_terms:
  # broadest anchor: covers "will/do/does/can/cannot/may not sponsor" and "not sponsorship-eligible"
  - "not sponsor"
  - "won't sponsor"
  - "no visa sponsorship"
  - "no immigration sponsorship"
  - "no sponsorship" # "no sponsorship (is) available / offered / provided"
  - "unable to sponsor"
  - "not able to sponsor"
  # "does not offer/provide/support [visa|immigration] sponsorship"
  - "not offer sponsorship"
  - "not offer visa sponsorship"
  - "not offer immigration sponsorship"
  - "not provide sponsorship"
  - "not provide visa sponsorship"
  - "not provide immigration sponsorship"
  - "not support sponsorship"
  - "not support visa sponsorship"
  - "unable to provide sponsorship"
  - "unable to provide visa sponsorship"
  - "unable to offer sponsorship"
  - "unable to offer visa sponsorship"
  - "sponsorship is not available"
  - "sponsorship not available"
  - "sponsorship is unavailable"
  - "not eligible for sponsorship"
  - "not eligible for visa sponsorship"
  - "ineligible for sponsorship"
  - "ineligible for visa sponsorship"
  # US-citizenship / security-clearance requirements — a visa candidate can't meet these
  - "security clearance"
  - "ts/sci"            # postings that write "TS/SCI clearance" without the word "security"
  - "be a us citizen"   # requirement phrasing ("candidate selected be a US Citizen"; "must be a US citizen")
  - "be a u.s. citizen" # same, period spelling (normalizer keeps the dots)

# AMBIGUOUS sponsorship wording: these describe the CANDIDATE ("must not require sponsorship",
# "authorized to work without sponsorship") — usually restrictive boilerplate, but not a
# guaranteed "we don't sponsor". A match does NOT drop the job; it is still scored and
# emailed, with a "possibly NO visa sponsorship" caveat line. Same matching semantics as
# exclude_description_terms above.
warn_description_terms:
  - "not require sponsorship" # "must not require sponsorship now or in the future"
  - "without sponsorship"     # "authorized to work ... without sponsorship"
  - "without the need for sponsorship"
  - "without the need for visa sponsorship"

# The candidate's real technical skills, used ONLY by the keyword-only scorer (the
# fallback when no OpenAI key / GPT CLI is available — e.g. cloud runs). Scores DISTINCT
# terms matched in the title+description, so keep this to meaningful skills, not resume
# filler. Matching is boundary-aware and case-insensitive:
# short/symbol tokens are safe ("go" won't hit "google", "ai" won't hit "email", "c++"
# matches literally) and a trailing plural "s" is absorbed ("api" hits "APIs"), but it
# does NOT stem — list "go" and "golang" (or "scikit-learn" and "sklearn") separately if
# a JD may use either. Purely additive: editing this never affects routing or filtering.
skill_keywords:
  # Programming languages
  - "python"
  - "c++"
  - "c#"
  - "java"
  - "go"
  - "golang"
  - "matlab"
  - "lua"
  - "bash"
  # ML / CV frameworks & libraries
  - "pytorch"
  - "tensorflow"
  - "keras"
  - "tensorboard"
  - "opencv"
  - "onnx"
  - "numpy"
  - "pandas"
  - "scikit-learn"
  - "sklearn"
  - "selenium"
  # ML / CV models & concepts (singular form; the "s?" match covers plurals)
  - "computer vision"
  - "machine learning"
  - "deep learning"
  - "reinforcement learning"
  - "neural network"
  - "artificial intelligence"
  - "ai"
  - "ml"
  - "cnn"
  - "rl"
  - "yolo"
  - "transformer"
  - "transfer learning"
  - "capsnet"
  - "stardist"
  - "object detection"
  - "segmentation"
  - "image"
  - "3d"
  - "data augmentation"
  # Backend / infra / tools
  - "git"
  - "docker"
  - "gcp"
  - "redis"
  - "mysql"
  - "nginx"
  - "linux"
  - "jira"
  - "api"
  - "rpc"
  - "backend"
  - "back-end"
  - "frontend"
  - "front-end"
  - "database"
  - "load balancing"
  - "algorithm"
  # CS fundamentals (from the TA role)
  - "oop"
  - "design pattern"

# Companies you have a referral at -> their roles form the TOP email group "Referral"
# (above Intern). Matched against the company NAME (case-insensitive), so each must match
# the `name:` used in companies.yaml.
referral_companies:
  - "Google"
  - "Google Taiwan" # same referral as Google, just filtered to Taiwan roles
  - "Microsoft"
  - "Zoox"
  - "Ford"
  - "Meta"
  - "Tesla"
  - "Dell"
  - "Intel"
  - "Applied Materials"

# Roles whose TITLE matches one of these (whole-word, case-insensitive) form the "Intern"
# group (below Referral, above "Other roles"). Whole-word matching keeps "internal" /
# "international" out.
intern_terms:
  - "intern"
  - "internship"
  - "co-op"
  - "coop"

# Roles whose TITLE matches one of these (whole-word, so "sr" doesn't hit inside other
# words) form the BOTTOM email group "Senior" — still listed, but last, since these are
# usually skimmed past. Referral outranks it: a senior role at a referral company stays
# in the Referral group.
senior_terms:
  - "senior"
  - "sr"

# Backstop for include_location_terms: still drops a location that matched an include term.
# Now "remote" is no longer an include token (see MATCHING NOTE below), a purely foreign location
# is already dropped by the allowlist; this list now only catches MIXED strings that cleared the
# allowlist on a US token but also name an excluded country (e.g. "Remote US & Canada"). Matched
# WHOLE-WORD (see PreFilter) so a country can't be swallowed by a US name: "india" drops ", India"
# but NOT "Indiana"/"Indianapolis"; "colombia" ('o') avoids US "Columbia" ('u').
exclude_location_terms:
  - "canada"
  - "colombia"
  - "malaysia"
  - "india"
  # Defense-in-depth: since the whole-word fix, ", pa"/", az" no longer leak "…, Panama/
  # Pakistan/Paraguay" or "…, Azerbaijan" at the include layer — this is now a second layer,
  # not the only one. KNOWN edge: "panama" also kills "Panama City, FL" (real US city, navy
  # UxS R&D area) — revisit if a company there is ever added.
  - "panama"
  - "pakistan"
  - "paraguay"
  - "azerbaijan"
  # Defense-in-depth for ", ma" (Massachusetts): since the whole-word fix, it no longer
  # substring-hits ", Masovian Voivodeship" (Warsaw, PL) at the include layer, and whole-word
  # "poland" can't clip a US name either. KNOWN edge: it also kills the tiny US towns
  # "Poland, OH"/"Poland, ME" — accepted, no target roles there.
  - "poland"
  # Foreign admin-region abbreviations that collide with 2-letter US state codes (comma OR dash
  # form): "Co." (Irish county) -> ", co"; "MD" (Madrid) -> ", md"; "NH"/"UT" (Dutch provinces);
  # "WA" (Western Australia). Whole-word, and keyed on the COUNTRY name rather than the 2-letter
  # code: "Madrid, MD, Spain" is dropped via "spain", while "Baltimore, MD" is untouched. None hit
  # a real US place in the ledger (unlike "Panama City, FL"), though tiny US towns "Ireland, IN"/
  # "Spain, NY" exist and would be dropped.
  - "ireland"
  - "spain"
  - "netherlands"
  - "australia"

# A job is kept only if its location (or, for a bare "Remote", its TITLE) contains one of these
# (allowed regions: US + Taiwan). Unknown/empty locations are excluded. Refine to taste.
# MATCHING NOTE (filters.py::_region_matcher): ", xx" (comma-space + two letters) = a US state
# code, matched after a comma OR dash + a word boundary ("Boston, MA" / "Remote - CA", but not
# ", Canada"/", Masovian"). A bare 2-3 letter token ("us") is whole-word (won't hit "Belarus").
# Everything else is a raw substring. "remote" is deliberately NOT a token — a bare "Remote" role
# already falls back to the title rule above.
include_location_terms:
  # Google's Taiwan location strings all end in ", Taiwan" (Taipei / New Taipei / Hsinchu).
  - "taiwan"
  - "united states"
  - "usa"
  - "us"
  - "u.s."
  - "california"
  - "new york"
  - "washington"
  - "texas"
  - "massachusetts"
  - "illinois"
  - "colorado"
  - "georgia"
  - "oregon"
  - "north carolina"
  - ", ca"
  - ", ny"
  - ", wa"
  - ", tx"
  - ", ma"
  - ", il"
  - ", co"
  - ", ga"
  - ", or"
  - ", nc"
  # State codes added 2026-07-10 for the CV-company wave (Pittsburgh/Ann Arbor/MD-VA defense
  # cluster). Since the whole-word fix (MATCHING NOTE above), ", pa"/", az" no longer leak
  # ", Panama"/", Azerbaijan" here either — same defense-in-depth as exclude_location_terms.
  # ", in"/", la"/", mo" are deliberately not listed; covered by the spelled-out names below.
  - ", pa"
  - ", mi"
  - ", md"
  - ", va"
  - ", nm"
  - ", fl"
  - ", az"
  - ", ri"
  - ", ut"
  - ", ky"
  - ", oh"
  - ", nh"
  - ", id"
  - ", mn"
  - ", tn"
  - ", nv"
  # Spelled-out states (collision-safe substrings) for labels that write the full name.
  - "pennsylvania"
  - "michigan"
  - "maryland"
  - "virginia"
  - "new mexico"
  - "florida"
  - "arizona"
  - "rhode island"
  - "utah"
  - "kentucky"
  - "ohio"
  - "new hampshire"
  - "idaho"
  - "minnesota"
  - "tennessee"
  - "nevada"
  - "louisiana"
  - "indiana"
  - "missouri"
  - "wisconsin"
  - "san francisco"
  - "mountain view"
  - "sunnyvale"
  - "palo alto"
  - "san jose"
  - "santa clara"
  - "cupertino"
  - "menlo park"
