name: job-scout

on:
  schedule:
    # :07/:37 — off the :00/:30 peak, where GitHub sheds/delays the most scheduled runs.
    # Still best-effort: runs may be delayed or dropped under load (no guaranteed cadence).
    - cron: "7,37 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: job-scout
  cancel-in-progress: false

env:
  LEDGER_BRANCH: data   # ledger lives here; main stays code-only

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      # Fail fast (before any setup) if secrets are missing. Otherwise a missing email secret
      # makes send_digest raise -> Pipeline swallows it -> ledger unsaved -> green run, no email;
      # and OPENAI_API_KEY set with RESUME_TEXT empty makes every score fail silently, dropping
      # qualifying roles (marked seen, never retried). Values are only tested for emptiness.
      - name: Check required secrets
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESUME_TEXT: ${{ secrets.RESUME_TEXT }}
        run: |
          missing=()
          if [ -z "$GMAIL_USER" ];         then missing+=(GMAIL_USER); fi
          if [ -z "$GMAIL_APP_PASSWORD" ]; then missing+=(GMAIL_APP_PASSWORD); fi
          if [ -z "$MAIL_TO" ];            then missing+=(MAIL_TO); fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing email secret(s): ${missing[*]}. Set them in Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -n "$OPENAI_API_KEY" ] && [ -z "$RESUME_TEXT" ]; then
            echo "::error::OPENAI_API_KEY is set but RESUME_TEXT is empty; scoring would fail silently. Set RESUME_TEXT, or unset OPENAI_API_KEY to use the keyword fallback."
            exit 1
          fi
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::notice::OPENAI_API_KEY not set; scoring will use the keyword-only fallback (codex CLI is unavailable on the runner)."
          fi
          echo "Secret check passed."

      - name: Check out code (main)
        uses: actions/checkout@v7

      # Put the ledger on its own branch into .ledger/. Auto-created if it doesn't exist yet.
      - name: Fetch ledger branch
        run: |
          remote="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          if git ls-remote --exit-code --heads "$remote" "$LEDGER_BRANCH" >/dev/null 2>&1; then
            # depth 2, NOT 1: at depth 1 the tip is the shallow graft point (parentless
            # to git), so commit_ledger's amend silently orphans the whole branch
            # history (hit 2026-07-15). At depth 2 the graft point is the tip's parent,
            # so the amend is safe.
            git clone --depth 2 --branch "$LEDGER_BRANCH" "$remote" .ledger
          else
            git init -b "$LEDGER_BRANCH" .ledger
            git -C .ledger remote add origin "$remote"
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run scan
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESUME_TEXT: ${{ secrets.RESUME_TEXT }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          LEDGER_DIR: .ledger/cloud_data   # per-company shard dir in the data-branch checkout
        run: python run.py

      - name: Commit ledger to the data branch
        working-directory: .ledger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -A is safe: this is a fresh checkout only the scan writes to, so it stages
          # exactly the ledger work (new/changed/orphan-deleted shards).
          git add -A
          git diff --cached --quiet && exit 0
          # Amend when the tip is already this bot's commit, collapsing repeated
          # cloud runs into one, while local_run.py's commits (different author)
          # remain as history boundaries. Only safe because the clone above uses
          # --depth 2 — see the comment there.
          commit_ledger() {
            if [ "$(git log -1 --format=%an 2>/dev/null || true)" = "github-actions[bot]" ]; then
              git commit --amend -m "update job ledger [skip ci]"
            else
              git commit -m "update job ledger [skip ci]"
            fi
          }
          # Amend rewrites the remote tip, so the push must force — but ONLY with
          # lease: plain --force could silently erase rows local_run.py pushed
          # between our fetch and push (a failed lease falls into the union-merge
          # retry below). --force-with-lease needs a remote-tracking ref though; a
          # brand-new branch has none — and nothing to overwrite — so push plainly.
          push_ledger() {
            if git rev-parse -q --verify "refs/remotes/origin/$LEDGER_BRANCH" >/dev/null; then
              git push --force-with-lease -u origin "$LEDGER_BRANCH"
            else
              git push -u origin "$LEDGER_BRANCH"
            fi
          }
          commit_ledger
          # On a rejected push (someone else moved the tip): reset to the new remote
          # tip and union-merge our rows back in via CsvStore.absorb — BOTH sides
          # rewrite whole sorted shards, so a `git pull` text merge conflicts and can
          # never recover (proven 2026-07-11).
          for i in 1 2 3; do
            if push_ledger; then exit 0; fi
            rm -rf /tmp/run_ledger
            cp -r cloud_data /tmp/run_ledger
            # --depth 2 keeps the new tip un-grafted in case commit_ledger amends it
            # (same trap as the clone above)
            git fetch --depth 2 origin "$LEDGER_BRANCH"
            git reset --hard FETCH_HEAD
            PYTHONPATH="$GITHUB_WORKSPACE" python - <<'EOF'
          import os
          from pathlib import Path

          from jobscout.config import Settings
          from jobscout.store import union_merge

          settings = Settings.load(Path(os.environ["GITHUB_WORKSPACE"]))
          union_merge(Path("cloud_data"), settings.track_names,
                      extra_dirs=[Path("/tmp/run_ledger")])
          EOF
            git add -A
            git diff --cached --quiet || commit_ledger
          done
          exit 1

  # Replaces GitHub's per-failure emails (disable those in account notification
  # settings): one email per failure streak, at the 3rd consecutive failure.
  # WARNING: cannot fire for runs that never start (e.g. "runner not acquired"
  # cancellations) — no notification at all once the built-in emails are off.
  notify-failure:
    needs: scan
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Email on 3rd consecutive failure
        env:
          GH_TOKEN: ${{ github.token }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          python - <<'EOF'
          import json, os, smtplib, urllib.request
          from email.message import EmailMessage

          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          FAIL = {"failure", "cancelled", "timed_out"}

          # status=completed excludes the current run (still in_progress); list starts at the previous run.
          url = (f"https://api.github.com/repos/{repo}/actions/workflows/"
                 "scan.yml/runs?status=completed&per_page=5")
          req = urllib.request.Request(url, headers={
              "Authorization": "Bearer " + os.environ["GH_TOKEN"],
              "Accept": "application/vnd.github+json",
          })
          with urllib.request.urlopen(req) as resp:
              prev = [r["conclusion"] for r in json.load(resp)["workflow_runs"]]

          # Current run is failure #1 of the streak; email only if the previous 2 also
          # failed and the one before that didn't (exactly streak length 3) — one email per outage, not per failed run.
          if len(prev) < 2 or prev[0] not in FAIL or prev[1] not in FAIL:
              print(f"Failure streak below 3 (previous: {prev[:3]}); not emailing.")
              raise SystemExit(0)
          if len(prev) >= 3 and prev[2] in FAIL:
              print("Streak already alerted at 3; not emailing again.")
              raise SystemExit(0)

          msg = EmailMessage()
          msg["Subject"] = "[job-scout] 3 consecutive workflow failures"
          msg["From"] = os.environ["GMAIL_USER"]
          msg["To"] = os.environ["MAIL_TO"]
          msg.set_content(
              "The job-scout workflow has failed 3 times in a row.\n"
              f"Latest run: https://github.com/{repo}/actions/runs/{run_id}\n"
          )
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(os.environ["GMAIL_USER"], os.environ["GMAIL_APP_PASSWORD"])
              s.send_message(msg)
          print("Alert email sent.")
          EOF
