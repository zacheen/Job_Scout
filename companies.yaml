# Company -> ATS mapping. Add/remove freely.
#
# Per-ATS required keys:
#   greenhouse: board            -> boards-api.greenhouse.io/v1/boards/{board}/jobs
#   lever:      org              -> api.lever.co/v0/postings/{org}
#   ashby:      org              -> api.ashbyhq.com/posting-api/job-board/{org}
#   workday:    host, tenant, site
#   amazon:     query (optional keyword search)
#   google:     query (optional), location (optional; default "United States")
#   oracle:     host, site (the CX_N siteNumber from the Oracle candidate-experience URL)
#   simplify:   repo (owner/name); optional path, branch  -> parses .github/scripts/listings.json
#   speedyapply:repo (owner/name); optional files (comma-separated .md tables), branch
#
# `seed_only: true`: FIRST run records the backlog silently (no email); only newly-posted
# roles email afterward. Used for the big GitHub aggregators to avoid one huge first digest.
#
# Slugs need verifying against each company's live careers page. A wrong slug is
# harmless: the fetcher logs a warning and that company is skipped for the run.
#
# Standard-ATS companies below, then the custom-site giants (Amazon, Google) that
# have their own fetchers. Meta/Apple/Microsoft remain deferred (see bottom).

# --- Greenhouse (board slug verified reachable for the first three) ---
- {name: Coinbase,   ats: greenhouse, board: coinbase}
- {name: Stripe,     ats: greenhouse, board: stripe}
- {name: Databricks, ats: greenhouse, board: databricks}
- {name: Dropbox,    ats: greenhouse, board: dropbox}
- {name: Instacart,  ats: greenhouse, board: instacart}
- {name: Robinhood,  ats: greenhouse, board: robinhood}
- {name: Reddit,     ats: greenhouse, board: reddit}
- {name: Discord,    ats: greenhouse, board: discord}
- {name: Figma,      ats: greenhouse, board: figma}
- {name: Plaid,      ats: greenhouse, board: plaid}
# Big backlogs (300-450 open roles) -> seed_only so the first run doesn't flood scoring/email.
- {name: Waymo,      ats: greenhouse, board: waymo, seed_only: true}       # careers.withwaymo.com is Greenhouse-hosted
- {name: DoorDash,   ats: greenhouse, board: doordashusa, seed_only: true} # careersatdoordash.com WAF-403s; board API is open
- {name: Pinterest,  ats: greenhouse, board: pinterest, seed_only: true}   # pinterestcareers.com front-end embeds gh_jid links

# --- Lever ---
- {name: Netflix,    ats: lever, org: netflix}
- {name: Zoox,       ats: lever, org: zoox}        # referral

# --- Ashby ---
- {name: OpenAI,     ats: ashby, org: openai}
- {name: Ramp,       ats: ashby, org: ramp}
- {name: Perplexity, ats: ashby, org: perplexity}

# --- Workday (host/tenant/site must match the company's myworkdayjobs URL) ---
- {name: NVIDIA, ats: workday, host: nvidia.wd5.myworkdayjobs.com, tenant: nvidia, site: NVIDIAExternalCareerSite}
- {name: Intel, ats: workday, host: intel.wd1.myworkdayjobs.com, tenant: intel, site: External}            # referral
- {name: Applied Materials, ats: workday, host: amat.wd1.myworkdayjobs.com, tenant: amat, site: External}  # referral
- {name: ASML, ats: workday, host: asml.wd3.myworkdayjobs.com, tenant: asml, site: ASMLEXT1}                # fetched, not referral
# careers.adobe.com front-end is Phenom, but the underlying Workday CXS is open (~1000 roles ->
# seed_only). Site external_university exists but returns 0 anonymously — don't add it.
- {name: Adobe, ats: workday, host: adobe.wd5.myworkdayjobs.com, tenant: adobe, site: external_experienced, seed_only: true}
# tenant "sec" = Samsung Electronics Co; site is global (~530 roles, US filtered by PreFilter) -> seed_only.
- {name: Samsung, ats: workday, host: sec.wd3.myworkdayjobs.com, tenant: sec, site: Samsung_Careers, seed_only: true}

# --- Oracle Recruiting (Fusion HCM candidate-experience API; newest-first, paginated) ---
- {name: Ford, ats: oracle, host: efds.fa.em5.oraclecloud.com, site: CX_1}       # referral
- {name: Dell, ats: oracle, host: iawmqy.fa.ocs.oraclecloud.com, site: CX_1001}  # referral (jobs.dell.com redirects here)

# --- Amazon (keyword search; `query` narrows it, results capped). Broaden/add a
#     second entry with a different query to widen coverage. ---
- {name: Amazon, ats: amazon, query: "engineer"}

# --- Google (parses the careers page's embedded JSON; US-only, newest-first). No
#     keyword: it pages through the newest roles and stops once a page has no unseen
#     role (dedup ledger), so steady-state runs fetch ~1 page. ---
- {name: Google, ats: google}

# --- GitHub job-list aggregators. One repo lists many employers; each role keeps its
#     REAL company (so referral-company roles still group under Referral) and dedupes
#     against direct-ATS roles by URL. seed_only per header above. ---
- {name: SpeedyApply AI, ats: speedyapply, repo: speedyapply/2027-AI-College-Jobs, files: "README.md,NEW_GRAD_USA.md", seed_only: true}
- {name: SpeedyApply SWE, ats: speedyapply, repo: speedyapply/2027-SWE-College-Jobs, files: "README.md,NEW_GRAD_USA.md", seed_only: true}
- {name: Simplify Internships, ats: simplify, repo: SimplifyJobs/Summer2026-Internships, seed_only: true}

# --- Deferred (community scrapers confirm these need a real browser session):
#     Microsoft (careers portal moved behind bearer tokens; old gcsservices search 404s),
#     Meta (metacareers GraphQL token minted by page JS — even dedicated scrapers intercept
#     it with headless Chrome), Tesla (cua-api behind Akamai; scrapers use stealth
#     Playwright/nodriver). Apple also deferred (CSRF handshake). ---

