# Company -> ATS mapping. Add/remove freely.
#
# Per-ATS required keys:
#   greenhouse: board            -> boards-api.greenhouse.io/v1/boards/{board}/jobs
#   lever:      org              -> api.lever.co/v0/postings/{org}
#   ashby:      org              -> api.ashbyhq.com/posting-api/job-board/{org}
#   workday:    host, tenant, site
#   amazon:     query (optional keyword search)
#   google:     query (optional), location (optional; default "United States")
#   oracle:     host, site (the CX_N siteNumber from the Oracle candidate-experience URL)
#   smartrecruiters: company (the companyId from jobs.smartrecruiters.com/{company})
#   jibe:       host             -> https://{host}/api/jobs (Jibe/iCIMS careers sites; newest-first)
#   workable:   account          -> apply.workable.com/api/v1/widget/accounts/{account}
#   jazzhr:     account          -> {account}.applytojob.com/apply (server-rendered HTML board)
#   tinder:     (no params) first-party proxy for Tinder-only roles
#   simplify:   repo (owner/name); optional path, branch  -> parses .github/scripts/listings.json
#   speedyapply:repo (owner/name); optional files (comma-separated .md tables), branch
#
# `seed_only: true`: FIRST run records the backlog silently (no email); only newly-posted
# roles email afterward. Used for the big GitHub aggregators to avoid one huge first digest.
#
# Slugs need verifying against each company's live careers page. A wrong slug is
# harmless: the fetcher logs a warning and that company is skipped for the run.
#
# Standard-ATS companies below, then the custom-site giants (Amazon, Google) that
# have their own fetchers. Meta/Apple/Microsoft remain deferred (see bottom).

