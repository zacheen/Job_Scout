# Company -> ATS mapping. Add/remove freely.
#
# Per-ATS required keys:
#   greenhouse: board            -> boards-api.greenhouse.io/v1/boards/{board}/jobs
#   lever:      org; region (optional: us, eu; default us)
#               -> api[.eu].lever.co/v0/postings/{org}
#   ashby:      org              -> api.ashbyhq.com/posting-api/job-board/{org}
#   workday:    host, tenant, site; searchText (optional — scopes a shared tenant, but
#               switches to relevance order -> bounded full pull instead of early-stop)
#   amazon:     query (optional keyword search)
#   google:     query (optional), location (optional; default "United States")
#   apple:      query (optional; default "United States"), max_pages (optional safety cap)
#   oracle:     host, site (the CX_N siteNumber from the Oracle candidate-experience URL)
#   smartrecruiters: company (the companyId from jobs.smartrecruiters.com/{company})
#   jibe:       host             -> https://{host}/api/jobs (Jibe/iCIMS careers sites; newest-first)
#   workable:   account          -> apply.workable.com/api/v1/widget/accounts/{account}
#   jazzhr:     account          -> {account}.applytojob.com/apply (server-rendered HTML board)
#   rippling:   board            -> api.rippling.com/platform/api/ats/v1/board/{board}/jobs
#   gem:        board            -> jobs.gem.com/{board} (anonymous GraphQL; no dates)
#   eightfold:  host, domain; api (optional "legacy" -> /api/apply/v2/jobs for tenants
#               that gate PCSX — Netflix). Both flavors newest-first.
#   radancy:    host, path (optional, default /search-jobs/results); full_scan (optional,
#               disables early-stop for unordered tenants), max_pages (optional safety cap)
#   bytedance:  atsx portal family; host (optional, default jobs.bytedance.com),
#               website_path (optional, default "en"), jd_base (optional) — TikTok uses all three
#   successfactors: host         -> {host}/search/ HTML rows, referencedate desc (newest-first)
#   avature:    host, newest_first (optional) -> {host}/en_US/careers/SearchJobs/ HTML cards
#   ibm:        country (optional, default "United States") -> www-api.ibm.com ES proxy
#   atlassian:  (no params) atlassian.com/endpoint/careers/listings
#   shopify:    (no params) shopify.com/careers server-rendered board
#   goldman:    (no params) api-higher.gs.com GraphQL (prof + early-career + campus)
#   jobvite:    company (the static c= id from the careers page)
#   whatnot:    (no params) jobs.whatnot.com/api/jobs
#   deshaw:     (no params) deshaw.com/careers __NEXT_DATA__
#   visa:       (no params) search.visa.com single POST
#   janestreet: (no params) janestreet.com/jobs/main.json
#   teamtailor: host             -> {host}/jobs.rss
#   bamboohr:   account          -> {account}.bamboohr.com/careers/list
#   dejobs:     host             -> {host}/jobs/feed/rss/ (branded DirectEmployers feed)
#   tinder:     (no params) first-party proxy for Tinder-only roles
#   simplify:   repo (owner/name); optional path, branch  -> parses .github/scripts/listings.json
#   speedyapply:repo (owner/name); optional files (comma-separated .md tables), branch
#
# `seed_only: true`: FIRST run records the backlog silently (no email); only newly-posted
# roles email afterward. Used for the big GitHub aggregators to avoid one huge first digest.
#
# Slugs need verifying against each company's live careers page. A wrong slug is
# harmless: the fetcher logs a warning and that company is skipped for the run.
#
# Standard-ATS companies below, then the custom-site giants with their own fetchers.
# Meta and Tesla remain deferred (see bottom).

