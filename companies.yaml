# Company -> ATS mapping. Add/remove freely.
#
# Per-ATS required keys:
#   greenhouse: board            -> boards-api.greenhouse.io/v1/boards/{board}/jobs
#   lever:      org              -> api.lever.co/v0/postings/{org}
#   ashby:      org              -> api.ashbyhq.com/posting-api/job-board/{org}
#   workday:    host, tenant, site
#   amazon:     query (optional keyword search)
#   google:     query (optional), location (optional; default "United States")
#
# Slugs need verifying against each company's live careers page. A wrong slug is
# harmless: the fetcher logs a warning and that company is skipped for the run.
#
# Standard-ATS companies below, then the custom-site giants (Amazon, Google) that
# have their own fetchers. Meta/Apple/Microsoft remain deferred (see bottom).

# --- Greenhouse (board slug verified reachable for the first three) ---
- {name: Coinbase,   ats: greenhouse, board: coinbase}
- {name: Stripe,     ats: greenhouse, board: stripe}
- {name: Databricks, ats: greenhouse, board: databricks}
- {name: Dropbox,    ats: greenhouse, board: dropbox}
- {name: Instacart,  ats: greenhouse, board: instacart}
- {name: Robinhood,  ats: greenhouse, board: robinhood}
- {name: Reddit,     ats: greenhouse, board: reddit}
- {name: Discord,    ats: greenhouse, board: discord}
- {name: Figma,      ats: greenhouse, board: figma}
- {name: Plaid,      ats: greenhouse, board: plaid}

# --- Lever ---
- {name: Netflix,    ats: lever, org: netflix}
- {name: Zoox,       ats: lever, org: zoox}        # referral

# --- Ashby ---
- {name: OpenAI,     ats: ashby, org: openai}
- {name: Ramp,       ats: ashby, org: ramp}
- {name: Perplexity, ats: ashby, org: perplexity}

# --- Workday (host/tenant/site must match the company's myworkdayjobs URL) ---
- {name: NVIDIA, ats: workday, host: nvidia.wd5.myworkdayjobs.com, tenant: nvidia, site: NVIDIAExternalCareerSite}
- {name: Intel, ats: workday, host: intel.wd1.myworkdayjobs.com, tenant: intel, site: External}            # referral
- {name: Applied Materials, ats: workday, host: amat.wd1.myworkdayjobs.com, tenant: amat, site: External}  # referral
- {name: ASML, ats: workday, host: asml.wd3.myworkdayjobs.com, tenant: asml, site: ASMLEXT1}                # referral

# --- Amazon (keyword search; `query` narrows it, results capped). Broaden/add a
#     second entry with a different query to widen coverage. ---
- {name: Amazon, ats: amazon, query: "engineer"}

# --- Google (parses the careers page's embedded JSON; US-only, newest-first). No
#     keyword: it pages through the newest roles and stops once a page has no unseen
#     role (dedup ledger), so steady-state runs fetch ~1 page. ---
- {name: Google, ats: google}

# --- Deferred (need a custom adapter or DevTools capture; several are referral companies):
#     Microsoft (gcsservices endpoint needs a bearer token), Meta (metacareers GraphQL with a
#     rotating token), Tesla (cua-api is Akamai bot-walled), Dell (Workday site 'External'
#     returns 0 jobs anonymously), Ford (Oracle Cloud HCM — unsupported ATS), Apple
#     (jobs.apple.com CSRF handshake). Capture the real request via browser DevTools to add. ---
